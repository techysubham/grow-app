# Optional: deploy the Express API to Render (free tier) from this repo.
# In the Render dashboard, add env vars (secrets) after the service is created — do not commit secrets here.
# See DEPLOY.md for the full checklist.
services:
  - type: web
    name: grow-api
    runtime: node
    plan: free
    region: oregon
    rootDir: Back
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUNNER_ID
        value: render
      # Set in Render dashboard (Secrets) — required for Image Overlay / listing watermarks
      - key: IMGBB_API_KEY
        sync: false
      # Amazon ASIN scrape — ScrapingDog key requires SCRAPER_PROVIDER=scrapingdog
      - key: SCRAPER_PROVIDER
        sync: false
      - key: SCRAPER_API_KEY
        sync: false
      # Gmail IMAP (Settings → Gmail Tester, transaction import)
      - key: GMAIL_IMAP_USER
        sync: false
      - key: GMAIL_IMAP_APP_PASSWORD
        sync: false
      - key: GMAIL_IMPORT_ALLOWED_SENDERS
        sync: false
      - key: GMAIL_IMPORT_ALLOWED_SUBJECTS
        sync: false
